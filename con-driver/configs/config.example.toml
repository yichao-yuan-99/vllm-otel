[driver]
# Required
driver_backend = "harbor"
pool = "swebench-verified"
max_concurrent = 500
n_task = 500
results_dir = "con-driver-test-3"
port_profile_id = 1
# Cluster mode (mutually exclusive with port_profile_id):
# port_profile_id_list = [0, 1, 2, 3, 4]
# max_concurrent_list = [5, 5, 5, 5, 5]
agent = "terminus-2"

# Optional
pattern = "eager"     # eager | poisson | possion
harbor_bin = "harbor" # or "uv run harbor"
seed = 7
dry_run = false
sample_without_replacement = true
# Optional task subset (0-based, end-exclusive) applied before sampling.
# task_subset_start = 0
# task_subset_end = 250

# Gateway mode (enabled by default)
# gateway = true
# gateway_url defaults to http://127.0.0.1:<gateway_parse_port>
# gateway_job_output_root = "gateway-output"
# gateway_timeout_s = 3600.0

# vLLM metrics logging defaults to enabled when port_profile_id or
# port_profile_id_list is set.
# vllm_log = true
# vllm_log endpoint is always resolved from port_profile_id
# vllm_log_interval_s = 1.0
# vllm_log_timeout_s = 5.0

# Optional extra Harbor args.
# con-driver auto-populates:
#   --agent
#   --model hosted_vllm/<served model from /v1/models>
#   --agent-kwarg api_base=...
#   --agent-kwarg base_url=...
#   --agent-kwarg model_info=...
# For mini-swe-agent only, loopback agent endpoints are rewritten for container
# reachability using CON_DRIVER_CONTAINER_HOST (default: 192.168.5.1).
# Agent-specific defaults like Terminus trajectory_config live in
# con-driver/configs/agent_defaults.toml.
#
# forwarded_args = [
#   "--agent-kwarg", "some_other_setting=value",
# ]
