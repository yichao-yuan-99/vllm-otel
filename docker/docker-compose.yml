name: vllm-otel

services:
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    ports:
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
      - "9411:9411"

  vllm:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ${VLLM_IMAGE_NAME:-yichaoyuan/vllm-openai-otel-lp}
    container_name: ${VLLM_CONTAINER_NAME:-vllm-openai-otel-lp}
    restart: unless-stopped
    depends_on:
      - jaeger
    ipc: host
    gpus: all
    environment:
      HF_HOME: ${HF_HOME:?Set HF_HOME in current shell}
      HF_HUB_CACHE: ${HF_HUB_CACHE:?Set HF_HUB_CACHE in current shell}
      HF_TOKEN: ${HF_TOKEN-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-vllm-server}
      OTEL_EXPORTER_OTLP_TRACES_INSECURE: ${OTEL_EXPORTER_OTLP_TRACES_INSECURE:-true}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-grpc://jaeger:4317}
      NVIDIA_VISIBLE_DEVICES: ${VLLM_VISIBLE_DEVICES:-2,3}
      VLLM_FORCE_SEQ_TRUST_REMOTE_CODE: ${VLLM_FORCE_SEQ_TRUST_REMOTE_CODE:-false}
    volumes:
      - ${HF_HOME:?Set HF_HOME in current shell}:${HF_HOME:?Set HF_HOME in current shell}
      - ${HF_HUB_CACHE:?Set HF_HUB_CACHE in current shell}:${HF_HUB_CACHE:?Set HF_HUB_CACHE in current shell}
    ports:
      - "${VLLM_SERVICE_PORT}:${VLLM_SERVICE_PORT}"
    entrypoint:
      - /opt/vllm-plugins/vllm_entrypoint.sh
    command:
      - --model
      - ${VLLM_MODEL_NAME:?Set VLLM_MODEL_NAME in docker/.env}
      - --served-model-name
      - ${VLLM_SERVED_MODEL_NAME:?Set VLLM_SERVED_MODEL_NAME in docker/.env}
      - --port
      - "${VLLM_SERVICE_PORT}"
      - --tensor-parallel-size
      - "${VLLM_TENSOR_PARALLEL_SIZE}"
      - --otlp-traces-endpoint
      - ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-grpc://jaeger:4317}
      - --collect-detailed-traces
      - ${VLLM_COLLECT_DETAILED_TRACES:-all}
      - --enable-prompt-tokens-details
      - --logits-processors
      - ${VLLM_LOGITS_PROCESSORS:-forceSeq.force_sequence_logits_processor:ForceSequenceAdapter}

  otel-smoke-test:
    image: ${VLLM_IMAGE_NAME:-yichaoyuan/vllm-openai-otel}
    profiles:
      - test
    depends_on:
      - vllm
      - jaeger
    environment:
      OTEL_SERVICE_NAME: ${OTEL_TEST_SERVICE_NAME:-otel-smoke-client}
      OTEL_EXPORTER_OTLP_TRACES_INSECURE: true
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: grpc://jaeger:4317
      VLLM_BASE_URL: http://vllm:${VLLM_SERVICE_PORT}
      VLLM_TEST_MODEL_NAME: ${VLLM_SERVED_MODEL_NAME:?Set VLLM_SERVED_MODEL_NAME in docker/.env}
      VLLM_STARTUP_TIMEOUT: ${VLLM_STARTUP_TIMEOUT:-600}
    volumes:
      - ./tests:/tests:ro
    entrypoint:
      - python3
      - /tests/dummy_otel_client.py

  force-seq-smoke-test:
    image: ${VLLM_IMAGE_NAME:-yichaoyuan/vllm-openai-otel}
    profiles:
      - test
    depends_on:
      - vllm
    environment:
      VLLM_BASE_URL: http://vllm:${VLLM_SERVICE_PORT}
      VLLM_TEST_MODEL_NAME: ${VLLM_SERVED_MODEL_NAME:?Set VLLM_SERVED_MODEL_NAME in docker/.env}
      VLLM_STARTUP_TIMEOUT: ${VLLM_STARTUP_TIMEOUT:-600}
      VLLM_FORCE_SEQUENCE_TEST_TEXT: ${VLLM_FORCE_SEQUENCE_TEST_TEXT:-FORCE_SEQ_SMOKE_OK}
    volumes:
      - ./tests:/tests:ro
    entrypoint:
      - python3
      - /tests/force_sequence_smoke_test.py
