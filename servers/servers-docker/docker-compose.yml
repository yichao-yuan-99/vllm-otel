name: vllm-otel

services:
  jaeger:
    image: ${JAEGER_IMAGE:?Set JAEGER_IMAGE via servers/servers-docker/service_images.toml}
    container_name: jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    ports:
      - "${JAEGER_API_PORT:-16686}:16686"
      - "${JAEGER_OTLP_PORT:-4317}:4317"

  vllm:
    image: ${VLLM_IMAGE_NAME:?Set VLLM_IMAGE_NAME via servers/servers-docker/service_images.toml}
    container_name: ${VLLM_CONTAINER_NAME:-vllm-openai-otel-lp}
    restart: unless-stopped
    depends_on:
      - jaeger
    ipc: host
    environment:
      HF_HOME: ${HF_HOME:?Set HF_HOME in current shell}
      HF_HUB_CACHE: ${HF_HUB_CACHE:?Set HF_HUB_CACHE in current shell}
      HF_TOKEN: ${HF_TOKEN-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-vllm-server}
      OTEL_EXPORTER_OTLP_TRACES_INSECURE: true
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: grpc://jaeger:4317
      VLLM_FORCE_SEQ_TRUST_REMOTE_CODE: ${VLLM_FORCE_SEQ_TRUST_REMOTE_CODE:-false}
      VLLM_MODEL_EXTRA_ARGS_B64: ${VLLM_MODEL_EXTRA_ARGS_B64-}
    volumes:
      - ${HF_HOME:?Set HF_HOME in current shell}:${HF_HOME:?Set HF_HOME in current shell}
      - ${HF_HUB_CACHE:?Set HF_HUB_CACHE in current shell}:${HF_HUB_CACHE:?Set HF_HUB_CACHE in current shell}
    ports:
      - "${VLLM_SERVICE_PORT}:${VLLM_SERVICE_PORT}"
    entrypoint:
      - /opt/vllm-plugins/vllm_entrypoint.sh
    command:
      - --model
      - ${VLLM_MODEL_NAME:?Set VLLM_MODEL_NAME via servers/servers-docker/client.py start}
      - --served-model-name
      - ${VLLM_SERVED_MODEL_NAME:?Set VLLM_SERVED_MODEL_NAME via servers/servers-docker/client.py start}
      - --port
      - "${VLLM_SERVICE_PORT}"
      - --tensor-parallel-size
      - "${VLLM_TENSOR_PARALLEL_SIZE}"
      - --otlp-traces-endpoint
      - grpc://jaeger:4317
      - --collect-detailed-traces
      - all
      - --enable-prompt-tokens-details
      - --logits-processors
      - forceSeq.force_sequence_logits_processor:ForceSequenceAdapter
